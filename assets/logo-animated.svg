<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <style>
      @keyframes typing1 {
        0% { width: 0; }
        30% { width: 280px; }
        35% { width: 280px; }
        55% { width: 0; }
        100% { width: 0; }
      }
      @keyframes typing2 {
        0% { width: 0; }
        40% { width: 0; }
        45% { width: 320px; }
        75% { width: 320px; }
        80% { width: 0; }
        100% { width: 0; }
      }
      @keyframes typing3 {
        0% { width: 0; }
        80% { width: 0; }
        85% { width: 260px; }
        95% { width: 260px; }
        100% { width: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes fadeIn {
        0% { opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; }
      }
      .logo-text {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 42px;
        font-weight: 700;
        fill: #1a1a2e;
        letter-spacing: 2px;
      }
      .tagline {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        fill: #64748b;
        letter-spacing: 1px;
      }
      .terminal {
        font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 13px;
        fill: #334155;
      }
      .terminal-prompt {
        font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 13px;
        fill: #059669;
        font-weight: bold;
      }
      .cursor-blink {
        fill: #1a1a2e;
        animation: blink 1s step-end infinite;
      }
      .typing-text {
        clip-path: inset(0 280px 0 0);
        animation: typing1 8s ease-in-out infinite;
      }
      .typing-text-2 {
        clip-path: inset(0 320px 0 0);
        animation: typing2 8s ease-in-out infinite;
      }
      .typing-text-3 {
        clip-path: inset(0 260px 0 0);
        animation: typing3 8s ease-in-out infinite;
      }
      .line {
        stroke: #e2e8f0;
        stroke-width: 1;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="180" fill="#f8fafc" rx="8"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" class="line"/>
    <line x1="0" y1="80" x2="800" y2="80" class="line"/>
    <line x1="0" y1="120" x2="800" y2="120" class="line"/>
    <line x1="0" y1="160" x2="800" y2="160" class="line"/>
  </g>
  
  <!-- Logo text -->
  <text x="400" y="65" text-anchor="middle" class="logo-text">ELNGENIX</text>
  
  <!-- Tagline -->
  <text x="400" y="90" text-anchor="middle" class="tagline">AUTONOMOUS AI SECURITY RESEARCH</text>
  
  <!-- Terminal window -->
  <rect x="150" y="110" width="500" height="55" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Terminal dots -->
  <circle cx="170" cy="123" r="4" fill="#ef4444"/>
  <circle cx="186" cy="123" r="4" fill="#f59e0b"/>
  <circle cx="202" cy="123" r="4" fill="#22c55e"/>
  
  <!-- Terminal prompt -->
  <text x="165" y="145" class="terminal-prompt">$</text>
  
  <!-- Typing text 1 -->
  <text x="180" y="145" class="terminal typing-text">
    <tspan>Scan 120+ security tools automatically</tspan>
  </text>
  
  <!-- Typing text 2 -->
  <text x="180" y="145" class="terminal typing-text-2">
    <tspan>AI-powered vulnerability discovery</tspan>
  </text>
  
  <!-- Typing text 3 -->
  <text x="180" y="145" class="terminal typing-text-3">
    <tspan>Think like a penetration tester</tspan>
  </text>
  
  <!-- Blinking cursor -->
  <rect x="180" y="133" width="8" height="16" class="cursor-blink"/>
  
</svg>
