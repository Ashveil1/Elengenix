<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 65">
  <defs>
    <style>
      .bg { fill: #000000; }
      .term { fill: #0a0a0a; stroke: #1a1a1a; stroke-width: 1; }
      .prompt { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #555555; }
      .cmd { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #999999; }
      .ok { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #22c55e; }
      .warn { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #eab308; }
      .dim { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #555555; }
    </style>
  </defs>

  <rect width="700" height="65" class="bg" rx="6"/>
  <rect x="10" y="8" width="680" height="48" class="term" rx="4"/>

  <circle cx="24" cy="20" r="4" fill="#444444"/>
  <circle cx="38" cy="20" r="4" fill="#2a2a2a"/>
  <circle cx="52" cy="20" r="4" fill="#2a2a2a"/>

  <text x="72" y="32" class="prompt">$</text>
  <text x="88" y="32" class="cmd">elengenix scan target.com</text>

  <text x="72" y="44" class="ok">[OK]</text>
  <text x="108" y="44" class="dim">Recon: 42 endpoints, 3 ports</text>

  <text x="320" y="44" class="ok">[OK]</text>
  <text x="356" y="44" class="dim">WAF: Cloudflare (0.95)</text>

  <text x="540" y="44" class="warn">[!]</text>
  <text x="566" y="44" class="dim">3 findings</text>

</svg>
