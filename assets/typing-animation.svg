<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 65">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

      /* Line 1: appear 0-30%, hold 30-35%, disappear 35-40% */
      @keyframes line1 { 0%{opacity:0} 2%{opacity:1} 30%{opacity:1} 35%{opacity:0} 100%{opacity:0} }

      /* Line 2: appear 40-70%, hold 70-75%, disappear 75-80% */
      @keyframes line2 { 0%{opacity:0} 40%{opacity:0} 42%{opacity:1} 70%{opacity:1} 75%{opacity:0} 100%{opacity:0} }

      /* Line 3: appear 80-95%, hold 95-98%, disappear 98-100% */
      @keyframes line3 { 0%{opacity:0} 80%{opacity:0} 82%{opacity:1} 95%{opacity:1} 100%{opacity:0} }

      .bg { fill: #000000; }
      .term { fill: #0a0a0a; stroke: #1a1a1a; stroke-width: 1; }
      .dot { fill: #333333; }
      .prompt { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #555555; }
      .line { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; fill: #999999; opacity: 0; }
      .cursor { fill: #ffffff; animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <rect width="700" height="65" class="bg" rx="6"/>
  <rect x="10" y="8" width="680" height="48" class="term" rx="4"/>

  <!-- dots -->
  <circle cx="24" cy="20" r="4" fill="#444444"/>
  <circle cx="38" cy="20" r="4" fill="#2a2a2a"/>
  <circle cx="52" cy="20" r="4" fill="#2a2a2a"/>

  <!-- prompt (always visible) -->
  <text x="72" y="40" class="prompt">$</text>

  <!-- cursor (follows prompt position, blinks) -->
  <rect x="86" y="26" width="8" height="18" class="cursor"/>

  <!-- line 1 -->
  <text x="88" y="40" class="line" style="animation: line1 8s linear infinite;">elengenix scan target.com</text>

  <!-- line 2 -->
  <text x="88" y="40" class="line" style="animation: line2 8s linear infinite;">120+ tools, AI reasoning, real-time</text>

  <!-- line 3 -->
  <text x="88" y="40" class="line" style="animation: line3 8s linear infinite;">find vulns before attackers do</text>

</svg>
