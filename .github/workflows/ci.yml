name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Ensure test deps are present
          pip install pytest pytest-timeout rich 2>/dev/null || true

      - name: Run test suite
        run: |
          python -m pytest -q --timeout=300 \
            tests/test_agent_autonomy.py \
            tests/test_vuln_reasoning_phase.py \
            tests/test_finding_provenance.py \
            tests/test_hypothesis_boost.py \
            tests/test_core_modules.py \
            tests/test_scope.py \
            tests/test_security.py \
            tests/test_new_scanners.py \
            tests/test_critical_modules.py

      - name: Boot smoke test
        run: |
          python -m elengenix --help || elengenix --help || true
